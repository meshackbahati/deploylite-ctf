<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel — DeployLite</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body>
    <div class="container">
        <nav class="nav">
            <a href="/dashboard" class="nav-brand">
                <svg viewBox="0 0 28 28" fill="none">
                    <rect width="28" height="28" rx="6" fill="url(#g)" />
                    <path d="M8 14l4 4 8-8" stroke="#fff" stroke-width="2.5" stroke-linecap="round"
                        stroke-linejoin="round" />
                    <defs>
                        <linearGradient id="g" x1="0" y1="0" x2="28" y2="28">
                            <stop stop-color="#6366f1" />
                            <stop offset="1" stop-color="#a855f7" />
                        </linearGradient>
                    </defs>
                </svg>
                DeployLite
            </a>
            <div class="nav-links">
                <a href="/dashboard">Dashboard</a>
                <a href="/profile">Profile</a>
                <a href="/admin" class="nav-admin-link active">Admin</a>
            </div>
            <div class="nav-user"></div>
        </nav>

        <div class="page-header">
            <h1>Admin Panel</h1>
        </div>

        <div class="stat-cards" id="adminStats">
            <div class="card stat-card">
                <div class="stat-value" id="sUsers">-</div>
                <div class="stat-label">Users</div>
            </div>
            <div class="card stat-card">
                <div class="stat-value" id="sProjects">-</div>
                <div class="stat-label">Projects</div>
            </div>
            <div class="card stat-card">
                <div class="stat-value" id="sBuilds">-</div>
                <div class="stat-label">Builds</div>
            </div>
            <div class="card stat-card">
                <div class="stat-value" id="sSuccess">-</div>
                <div class="stat-label">Successful</div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchAdminTab('audit')">Audit Logs</button>
            <button class="tab" onclick="switchAdminTab('users')">Users</button>
        </div>

        <div id="tab-audit" class="tab-content active">
            <div class="card">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
                    <h3 style="font-size:0.875rem;color:var(--text-muted)">Recent Activity</h3>
                    <select id="auditFilter" onchange="loadAuditLogs()"
                        style="padding:0.375rem 0.75rem;background:var(--bg-glass);border:1px solid var(--border-color);border-radius:0.375rem;color:var(--text-primary);font-size:0.8125rem">
                        <option value="">All Actions</option>
                        <option value="user.login">Logins</option>
                        <option value="user.register">Registrations</option>
                        <option value="user.login_failed">Failed Logins</option>
                        <option value="build.trigger">Build Triggers</option>
                        <option value="project.create">Project Creates</option>
                        <option value="project.delete">Project Deletes</option>
                    </select>
                </div>
                <div id="auditLogList">
                    <div class="loading">Loading logs...</div>
                </div>
            </div>
        </div>

        <div id="tab-users" class="tab-content">
            <div class="card">
                <h3 style="font-size:0.875rem;color:var(--text-muted);margin-bottom:1rem">Registered Users</h3>
                <div id="userList">
                    <div class="loading">Loading users...</div>
                </div>
            </div>
        </div>

        <footer class="footer">
            <p>© 2024 DeployLite Inc.</p>
        </footer>
    </div>

    <script src="/js/common.js"></script>
    <script src="/js/admin.js"></script>
</body>

</html>
