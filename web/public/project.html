<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project — DeployLite</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body>
    <div class="container">
        <nav class="nav">
            <a href="/dashboard" class="nav-brand">
                <svg viewBox="0 0 28 28" fill="none">
                    <rect width="28" height="28" rx="6" fill="url(#g)" />
                    <path d="M8 14l4 4 8-8" stroke="#fff" stroke-width="2.5" stroke-linecap="round"
                        stroke-linejoin="round" />
                    <defs>
                        <linearGradient id="g" x1="0" y1="0" x2="28" y2="28">
                            <stop stop-color="#6366f1" />
                            <stop offset="1" stop-color="#a855f7" />
                        </linearGradient>
                    </defs>
                </svg>
                DeployLite
            </a>
            <div class="nav-links">
                <a href="/dashboard">Dashboard</a>
                <a href="/profile">Profile</a>
                <a href="/admin" class="nav-admin-link" style="display:none">Admin</a>
            </div>
            <div class="nav-user"></div>
        </nav>

        <div id="projectContent" class="fade-in">
            <div class="loading">Loading project...</div>
        </div>

        <!-- Build Trigger Modal -->
        <div class="modal-overlay" id="buildModal">
            <div class="modal">
                <h3>Trigger Build</h3>
                <div id="buildAlert" class="alert"></div>
                <form id="buildForm">
                    <div class="input-group">
                        <label for="buildRepo">Repository URL</label>
                        <input type="text" id="buildRepo" placeholder="https://github.com/org/repo">
                    </div>
                    <div class="input-group">
                        <label for="buildScript">Build Script</label>
                        <textarea id="buildScript" placeholder="npm ci && npm run build && npm run test" rows="4"
                            style="font-family:'JetBrains Mono',monospace;font-size:0.8125rem"></textarea>
                    </div>
                    <div class="input-group">
                        <label for="buildBranch">Branch</label>
                        <input type="text" id="buildBranch" value="main" placeholder="main">
                    </div>
                    <div style="display:flex;gap:0.75rem;justify-content:flex-end;margin-top:1.5rem">
                        <button type="button" class="btn btn-secondary" onclick="closeBuildModal()">Cancel</button>
                        <button type="submit" class="btn btn-primary" id="triggerBtn">Run Build</button>
                    </div>
                </form>
            </div>
        </div>

        <footer class="footer">
            <p>© 2024 DeployLite Inc.</p>
        </footer>
    </div>

    <script src="/js/common.js"></script>
    <script src="/js/project.js"></script>
</body>

</html>
